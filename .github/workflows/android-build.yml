name: Android APK build (3D deneme)

# Her main'e push'ta ve istersen elle (Actions sekmesinden "Run workflow")
# tetiklenir. Godot'u ve Android export template'lerini indirip
# export_presets.cfg'deki "Android" preset'ini kullanarak bir debug APK
# uretir, sonra bu APK'yi hem calisan is (workflow) ciktisina hem de
# "latest-apk" adli surekli guncellenen bir GitHub Release'e ekler.
# Boylece telefondan Releases sayfasindan direkt indirilebilir.

on:
  push:
    branches: [3d]
  workflow_dispatch: {}

env:
  GODOT_TAG: "4.4-stable"          # GitHub release etiketi (indirme URL'sinde kullanilir)
  GODOT_TEMPLATE_VERSION: "4.4.stable"  # Godot'un yerelde bekledigi klasor adi (nokta ile)

permissions:
  contents: write  # Release olusturup APK yuklemek icin gerekli

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Godot editor + Android export template'lerini indir
        run: |
          set -e
          mkdir -p /opt/godot

          curl -sSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /opt/godot/editor
          GODOT_BIN=$(find /opt/godot/editor -maxdepth 2 -type f -name 'Godot_*')
          chmod +x "$GODOT_BIN"
          mv "$GODOT_BIN" /opt/godot/godot

          curl -sSL -o /tmp/templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_export_templates.tpz"
          mkdir -p /tmp/templates_extracted
          unzip -q /tmp/templates.tpz -d /tmp/templates_extracted
          TEMPLATES_SRC=$(find /tmp/templates_extracted -maxdepth 2 -type d -name templates | head -1)
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          cp -r "$TEMPLATES_SRC"/* "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"

      - name: Indirilen template dosyalarini listele (teshis)
        run: find "$HOME/.local/share/godot/export_templates" -maxdepth 2

      - name: Android build sablonunu projeye kur (gradle build icin gerekli)
        # gradle_build/use_gradle_build=true oldugunda Godot, projede
        # res://android/build/ altinda bir Gradle projesi bekliyor.
        # Bunu normalde editorde "Project > Install Android Build Template"
        # ile yapardik; CI'da export template'lerin icindeki
        # android_source.zip'i elle acarak ayni seyi yapiyoruz.
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/android/build"
          unzip -q "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/android_source.zip" \
            -d "$GITHUB_WORKSPACE/android/build"
          # Gradle projeleri SDK yolunu Godot'un ayarlarindan degil,
          # standart "local.properties" dosyasindan okur.
          echo "sdk.dir=$ANDROID_HOME" > "$GITHUB_WORKSPACE/android/build/local.properties"
          # Editorun "Install Android Build Template" adimi bu iki dosyayi
          # da olusturur; Godot "Checking build version..." asamasinda
          # .build_version dosyasindaki surumu motorla karsilastirir.
          echo "${GODOT_TEMPLATE_VERSION}" > "$GITHUB_WORKSPACE/android/.build_version"
          touch "$GITHUB_WORKSPACE/android/build/.gdignore"

      - name: Android SDK icerigini derinlemesine listele (teshis)
        run: |
          echo "--- build-tools ---"
          find "$ANDROID_HOME/build-tools" -maxdepth 2
          echo "--- platforms ---"
          find "$ANDROID_HOME/platforms" -maxdepth 1
          echo "--- ndk ---"
          find "$ANDROID_HOME/ndk" -maxdepth 1 || true

      - name: Android APK olustur (debug)
        run: |
          set -e
          echo "ANDROID_HOME=$ANDROID_HOME"
          mkdir -p builds
          /opt/godot/godot --headless --verbose --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" builds/survival-3d-debug.apk
          ls -la builds

      - name: APK'yi is ciktisi olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: survival-3d-debug-apk
          path: builds/survival-3d-debug.apk

      - name: latest-apk release'ini guncelle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 3d-apk
          name: "3D deneme build (Asama B)"
          body: "3D deneme surumu (ayri uygulama olarak kurulur, ana oyunu etkilemez)."
          make_latest: false
          files: builds/survival-3d-debug.apk
