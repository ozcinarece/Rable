name: Stil vitrin ekran goruntusu

# style_showcase.tscn'i (ana oyunu degil) sanal ekranda calistirir; gunduz +
# gece karesi alir ve docs/screens/vitrin*.png olarak commit'ler. main_scene
# yalniz EFEMERAL CI kopyasinda gecici degistirilir (repoya yazilmaz).

on:
  workflow_dispatch: {}

env:
  GODOT_TAG: "4.4-stable"

permissions:
  contents: write

jobs:
  shot:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Godot editor indir
        run: |
          set -e
          mkdir -p /opt/godot
          curl -sSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /opt/godot/editor
          GODOT_BIN=$(find /opt/godot/editor -maxdepth 2 -type f -name 'Godot_*')
          chmod +x "$GODOT_BIN"
          mv "$GODOT_BIN" /opt/godot/godot

      - name: Sanal ekran kur
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb

      - name: Projeyi ice aktar
        run: /opt/godot/godot --headless --import --path "$GITHUB_WORKSPACE" || true

      - name: Ana sahneyi gecici vitrine cevir (yalniz CI kopyasi)
        run: |
          sed -i 's|run/main_scene="res://scenes/World3D.tscn"|run/main_scene="res://scenes/style_showcase.tscn"|' \
            "$GITHUB_WORKSPACE/project.godot"
          grep main_scene "$GITHUB_WORKSPACE/project.godot"

      - name: Vitrini calistir ve goruntu al
        run: |
          mkdir -p "$GITHUB_WORKSPACE/docs/screens"
          RABLE_SHOWCASE_SHOT="$GITHUB_WORKSPACE/docs/screens/vitrin.png" timeout 120 \
            xvfb-run -a -s "-screen 0 1280x720x24" \
            /opt/godot/godot --path "$GITHUB_WORKSPACE" --rendering-driver opengl3 \
            2>&1 | tail -30 || true
          ls -la "$GITHUB_WORKSPACE/docs/screens" | grep vitrin || true

      - name: Goruntuyu commit'le
        run: |
          cd "$GITHUB_WORKSPACE"
          git checkout -- project.godot
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screens/vitrin.png docs/screens/vitrin_gece.png
          git commit -m "Stil vitrin ekran goruntusu (otomatik)" || echo "degisiklik yok"
          git push
