name: Web build ve GitHub Pages yayini

# Iki oyunu birden yayinlar:
#   /      -> 2D ana oyun (main dali)
#   /3d/   -> 3D deneme (3d dali, her zaman son hali)
# main VEYA 3d dalina her push'ta iki dal da bastan derlenir; boylece
# site hep iki dalin da guncel halini tasir.
# Not: preset'te thread_support=false olmali, cunku GitHub Pages
# SharedArrayBuffer icin gereken COOP/COEP basliklarini gondermez.

# NOT: Pages ortami sadece main dalindan yayina izin verir.
# Bu daldan yayin, android-build'in son adimiyla main uzerinden tetiklenir.
on:
  push:
    branches: [main, 3d]
    # Ekran-goruntusu botunun docs/screens commit'leri oyunu degistirmez;
    # ustelik her biri suren Pages yayinini iptal edip (cancel-in-progress)
    # "web hep eski" sorununa yol aciyordu. Docs push'lari yayini tetiklemez.
    paths-ignore: ["docs/**"]
  workflow_dispatch: {}

env:
  GODOT_TAG: "4.4-stable"
  GODOT_TEMPLATE_VERSION: "4.4.stable"

permissions:
  contents: read
  pages: write      # Pages'e yayin icin
  id-token: write   # deploy-pages action'inin kimlik dogrulamasi icin

# Ayni anda tek yayin calissin
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: main dalini al (2D)
        uses: actions/checkout@v4
        with:
          ref: main
          path: src-main

      - name: 3d dalini al (3D deneme)
        uses: actions/checkout@v4
        with:
          ref: 3d
          path: src-3d

      - name: Godot editor + export template'lerini indir
        run: |
          set -e
          mkdir -p /opt/godot

          curl -sSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /opt/godot/editor
          GODOT_BIN=$(find /opt/godot/editor -maxdepth 2 -type f -name 'Godot_*')
          chmod +x "$GODOT_BIN"
          mv "$GODOT_BIN" /opt/godot/godot

          curl -sSL -o /tmp/templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_export_templates.tpz"
          mkdir -p /tmp/templates_extracted
          unzip -q /tmp/templates.tpz -d /tmp/templates_extracted
          TEMPLATES_SRC=$(find /tmp/templates_extracted -maxdepth 2 -type d -name templates | head -1)
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          cp -r "$TEMPLATES_SRC"/* "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"

      - name: Web build olustur (2D kok dizine, 3D /3d altina)
        run: |
          set -e
          mkdir -p site/3d
          /opt/godot/godot --headless --path "$GITHUB_WORKSPACE/src-main" \
            --export-release "Web" "$GITHUB_WORKSPACE/site/index.html"
          /opt/godot/godot --headless --path "$GITHUB_WORKSPACE/src-3d" \
            --export-release "Web" "$GITHUB_WORKSPACE/site/3d/index.html"
          ls -la site site/3d

      - name: Onbellek/eski service-worker temizleyici enjekte et
        # Eski build'lerden kalan service-worker'lar telefonda eski oyunu
        # cevrimdisi onbellekten servis edip "hep eski geliyor" sorununa yol
        # aciyordu. Her index.html basina; kalan SW'leri kaldirir, cache'i
        # bosaltir ve bir kez yeniler (network'ten taze surumu ceker).
        run: |
          SNIP='<script>(function(){try{if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(function(rs){var had=rs.length>0;rs.forEach(function(r){r.unregister();});if(window.caches&&caches.keys){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});}if(had&&!sessionStorage.getItem("sw_cleared")){sessionStorage.setItem("sw_cleared","1");location.reload();}});}}catch(e){}})();</script>'
          for f in site/index.html site/3d/index.html; do
            SNIP="$SNIP" python3 - "$f" <<'PY'
import os,sys
f=sys.argv[1]; snip=os.environ["SNIP"]
s=open(f,encoding="utf-8").read()
if "sw_cleared" not in s:
    s=s.replace("<head>","<head>"+snip,1)
    open(f,"w",encoding="utf-8").write(s); print("injected",f)
else:
    print("already",f)
PY
          done

      - name: Pages artifact'i olarak yukle
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Repo public oldugunda Pages'i otomatik aktive eder
      - name: Pages'i yapilandir (gerekirse aktive et)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: GitHub Pages'e yayinla
        id: deployment
        uses: actions/deploy-pages@v4
